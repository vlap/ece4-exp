name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12']

    env:
      ECE4_SKIP_SYNC: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[highlight]"
        pip install pytest

    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short

    - name: Write test defaults and seed EC-Earth4 cache
      run: |
        mkdir -p ~/.config/ece4-exp/cache/ecearth4/scripts/runtime
        mkdir -p ~/.config/ece4-exp/cache/ecearth4/scripts/platforms
        cat > ~/.config/ece4-exp/defaults.yml <<'EOF'
        platform: bsc-marenostrum5
        launcher: slurm-wrapper-taskset
        kind: auto
        repo_owner: ec-earth
        repo_branch: v4.1.8
        account: testaccount
        EOF
        cat > ~/.config/ece4-exp/cache/ecearth4/scripts/runtime/experiment-config-example.yml <<'BASECFG'
        ece4:
          experiment:
            id: XXXX
            description: A new ECE4 experiment
            schedule:
              all: "DTSTART:18500101 RRULE:FREQ=YEARLY;INTERVAL=1;UNTIL=18510101"
              nlegs: 1
            run_from_scratch: false
          model_config:
            components: []
          job:
            launch:
              method: slurm-wrapper-taskset
            resubmit: true
            slurm:
              sbatch:
                opts:
                  time: "00:30:00"
                  output: XXXX.log
                  job-name: ECE4_XXXX
        BASECFG
        cat > ~/.config/ece4-exp/cache/ecearth4/scripts/platforms/bsc-marenostrum5-intel+intelmpi.yml <<'PLATCFG'
        - base.context:
            platform:
              cpus_per_node: 112
            job:
              slurm:
                sbatch:
                  opts:
                    qos: gp_bsces
        PLATCFG
        cat > ~/.config/ece4-exp/cache/ecearth4/scripts/platforms/ecmwf-hpc2020-intel+openmpi.yml <<'PLATCFG'
        - base.context:
            platform:
              cpus_per_node: 128
            job:
              slurm:
                sbatch:
                  opts:
                    qos: np
        PLATCFG

    - name: Test CLI installation
      run: |
        ece4-exp --help
        ece4-exp list

    - name: Test generate (nodes-first interface)
      run: |
        ece4-exp generate gcm-sr 10 a001 --platform bsc-marenostrum5 --account test --dry-run

    - name: Test generate (backward-compat --sim-procs)
      run: |
        ece4-exp generate --recipe gcm-sr.yml --sim-procs 1120 --expid a001 --platform bsc-marenostrum5 --account test --dry-run

    - name: Test all built-in recipes
      run: |
        ece4-exp generate omip-sr 2 o001 --platform bsc-marenostrum5 --account test --dry-run
        ece4-exp generate amip-sr 8 atm1 --platform bsc-marenostrum5 --account test --dry-run
        ece4-exp generate ccycle-sr 10 cc01 --platform bsc-marenostrum5 --account test --dry-run

    - name: Test expid validation
      run: |
        ece4-exp generate gcm-sr 10 toolong --platform bsc-marenostrum5 --account test --dry-run || echo "Expected failure"

    - name: Test inspect command
      run: |
        ece4-exp inspect gcm-sr
        ece4-exp inspect omip-sr

    - name: Test generate + validate
      run: |
        ece4-exp generate gcm-sr 10 test --platform bsc-marenostrum5 --account test -o test.yml
        ece4-exp validate test.yml

    - name: Test ECMWF platform
      run: |
        ece4-exp generate gcm-sr 10 ec01 --platform ecmwf-hpc2020 --account spesiccf --dry-run
