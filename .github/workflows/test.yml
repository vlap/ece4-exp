name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Test CLI installation
      run: |
        ece4-exp --help
        ece4-exp list

    - name: Test generate command
      run: |
        ece4-exp generate --recipe gcm-sr.yml --sim-procs 1120 --expid a001 --platform bsc-marenostrum5 --account test --dry-run

    - name: Test expid validation
      run: |
        # This should fail with clear error
        ece4-exp generate --recipe gcm-sr.yml --sim-procs 1120 --expid toolong --platform bsc-marenostrum5 --account test --dry-run || echo "Expected failure"

    - name: Test validate command
      run: |
        # Generate a config first
        ece4-exp generate --recipe gcm-sr.yml --sim-procs 1120 --expid test --platform bsc-marenostrum5 --account test -o test.yml
        # Then validate it
        ece4-exp validate test.yml
